networks:
  default:
    name: tachy

services:
  postgres:
    # pg_trgm/pgcrypto/vector are all already present in this image -- no
    # postgresql-contrib needed (verified directly; see test/global-setup.ts,
    # which relies on the same fact for the test suite's Testcontainers DB).
    image: pgvector/pgvector:pg16
    container_name: tachy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tachy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tachy}
      POSTGRES_DB: ${POSTGRES_DB:-tachy}
    ports:
      # localhost-only: nothing on the office LAN needs raw Postgres access
      - "127.0.0.1:5433:5432"
    volumes:
      - tachy-postgres-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-tachy} -d ${POSTGRES_DB:-tachy}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${TACHY_IMAGE:-diegokoes/tachy:latest}
    build: .
    container_name: tachy-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-tachy}:${POSTGRES_PASSWORD:-tachy}@postgres:5432/${POSTGRES_DB:-tachy}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8787:8787"
    volumes:
      - ./backups:/app/backups
      # Linked-repo clones for code search — survives redeploys so reindexes
      # stay diff-only instead of re-cloning.
      - tachy-repo-data:/app/data
      # Claude Code login + agent SDK session transcripts. Persisting this
      # keeps the server's Claude login and lets multi-turn chats resume
      # across container redeploys.
      - tachy-agent-home:/root/.claude

  # Not started by `up`. Run ad hoc, e.g.:
  #   docker compose run --rm cli npm run sync <source-slug>
  #   docker compose run --rm cli npm run sync backup
  #   docker compose run --rm cli npm run sync embed-backfill
  cli:
    image: ${TACHY_IMAGE:-diegokoes/tachy:latest}
    build: .
    profiles: ["tools"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-tachy}:${POSTGRES_PASSWORD:-tachy}@postgres:5432/${POSTGRES_DB:-tachy}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backups:/app/backups
      - tachy-repo-data:/app/data

volumes:
  tachy-postgres-data:
  tachy-repo-data:
  tachy-agent-home:
