name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # for the backup/restore round-trip test
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - run: npm run typecheck

      # Tests start their own Postgres via Testcontainers; the GitHub-hosted
      # ubuntu runner has Docker preinstalled, so no service container needed.
      # Ryuk (Testcontainers' cleanup sidecar) frequently can't start under
      # GH Actions' default networking -- disabling it is the standard fix.
      - run: npm test
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
