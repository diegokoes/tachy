name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 22, not 20: testcontainers' undici dependency calls a webidl API
      # (markAsUncloneable) that doesn't exist before Node 22.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # for the backup/restore round-trip test
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - run: npm run typecheck

      # Tests start their own Postgres via Testcontainers; the GitHub-hosted
      # ubuntu runner has Docker preinstalled, so no service container needed.
      - run: npm test
